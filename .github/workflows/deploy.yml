name: Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync
        env:
          STRATO_SSH_KEY: ${{ secrets.STRATO_SSH_KEY }}
          STRATO_SSH_HOST: ${{ secrets.STRATO_SSH_HOST }}
          STRATO_SSH_USER: ${{ secrets.STRATO_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$STRATO_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$STRATO_SSH_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            "$STRATO_SSH_USER@$STRATO_SSH_HOST:strategy-tracker/"
