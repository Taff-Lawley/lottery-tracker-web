name: Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync
        run: |
          sshpass -p "$STRATO_SSH_PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.STRATO_SSH_USER }}@${{ secrets.STRATO_SSH_HOST }}:strategy-tracker/
        env:
          STRATO_SSH_PASS: ${{ secrets.STRATO_SSH_PASS }}
