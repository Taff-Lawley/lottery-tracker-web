name: Deploy to Strato

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: strategy-tracker/
          remote_host: ${{ secrets.STRATO_SSH_HOST }}
          remote_user: ${{ secrets.STRATO_SSH_USER }}
          remote_key: ${{ secrets.STRATO_SSH_KEY }}
